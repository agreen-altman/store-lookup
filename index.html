<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Store Sales Lookup</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232732;
  --border: #2d3142;
  --text: #e8eaed;
  --text2: #9ca3b0;
  --orange: #e8762d;
  --blue-dark: #1a3a6b;
  --blue-light: #5ba4cf;
  --green: #34c759;
  --red: #ff453a;
  --accent: #6c8cff;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: 'DM Sans', -apple-system, sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }
.app { display: flex; flex-direction: column; height: 100dvh; }

.header { padding: 12px 16px 8px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 8px; }

.view-toggle { display: flex; gap: 4px; background: var(--bg); border-radius: 8px; padding: 3px; margin-bottom: 8px; }
.view-btn { flex: 1; padding: 7px 0; border: none; border-radius: 6px; background: transparent; color: var(--text2); font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.view-btn.active { background: var(--accent); color: #fff; }

.cat-tabs { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab { padding: 5px 14px; border: 1px solid var(--border); border-radius: 20px; background: transparent; color: var(--text2); font-family: inherit; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
.cat-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.search-wrap { padding: 8px 16px; background: var(--surface); flex-shrink: 0; }
.search-box { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; }
.search-box svg { flex-shrink: 0; color: var(--text2); }
.search-box input { flex: 1; padding: 10px 8px; border: none; background: transparent; color: var(--text); font-family: inherit; font-size: 14px; outline: none; }
.search-box input::placeholder { color: var(--text2); }
.result-count { font-size: 11px; color: var(--text2); padding: 4px 16px 0; background: var(--surface); flex-shrink: 0; }

.list-container { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 4px 0; }
.store-row { display: flex; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); gap: 10px; cursor: pointer; transition: background 0.15s; }
.store-row:active { background: var(--surface2); }

.rank { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 11px; font-weight: 700; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
.rank-hd { background: rgba(232,118,45,0.15); color: var(--orange); }
.rank-lo { background: rgba(26,58,107,0.3); color: #7ab3e0; }
.rank-wm { background: rgba(91,164,207,0.15); color: var(--blue-light); }

.store-info { flex: 1; min-width: 0; }
.store-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.store-addr { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.store-metrics { text-align: right; flex-shrink: 0; }
.store-sales { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.store-comp { font-size: 11px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.comp-pos { color: var(--green); }
.comp-neg { color: var(--red); }

.store-detail { padding: 0 16px 10px; border-bottom: 1px solid var(--border); background: var(--surface); animation: slideDown 0.2s ease; }
@keyframes slideDown { from { opacity: 0; max-height: 0; } to { opacity: 1; max-height: 200px; } }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; padding-top: 8px; }
.detail-item label { display: block; font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.detail-item span { font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }

.sort-bar { display: flex; align-items: center; gap: 6px; padding: 6px 16px; background: var(--surface); flex-shrink: 0; border-bottom: 1px solid var(--border); }
.sort-bar label { font-size: 11px; color: var(--text2); }
.sort-select { background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 11px; padding: 4px 8px; outline: none; }

.retailer-filter { display: flex; gap: 6px; margin-left: auto; }
.ret-btn { width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--border); cursor: pointer; transition: all 0.2s; position: relative; }
.ret-btn.active { border-color: transparent; }
.ret-btn.active::after { content: ''; position: absolute; inset: -3px; border-radius: 50%; border: 2px solid currentColor; }
.ret-hd { background: var(--orange); color: var(--orange); }
.ret-lo { background: var(--blue-dark); color: var(--blue-dark); }
.ret-wm { background: var(--blue-light); color: var(--blue-light); }
.ret-btn:not(.active) { opacity: 0.3; }

.no-results { text-align: center; padding: 40px 20px; color: var(--text2); font-size: 14px; }

/* ===== MAP STYLES ===== */
.map-container { flex: 1; position: relative; overflow: hidden; touch-action: none; }
#mapCanvas { width: 100%; height: 100%; display: block; }

.map-legend { position: absolute; bottom: 16px; left: 12px; z-index: 100; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; display: flex; gap: 12px; font-size: 11px; pointer-events: none; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

.map-controls { position: absolute; top: 12px; right: 12px; z-index: 100; display: flex; flex-direction: column; gap: 4px; }
.map-ctrl-btn { width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface); color: var(--text); font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.map-ctrl-btn:active { background: var(--surface2); }

/* Popup card overlay */
.map-popup-overlay { position: absolute; inset: 0; z-index: 200; display: flex; align-items: flex-end; justify-content: center; pointer-events: none; }
.map-popup-overlay.visible { pointer-events: auto; }
.map-popup-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px 14px 0 0;
  padding: 16px 20px 24px;
  width: 100%;
  max-width: 400px;
  transform: translateY(100%);
  transition: transform 0.25s ease;
  box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
}
.map-popup-overlay.visible .map-popup-card { transform: translateY(0); }
.popup-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.popup-name { font-size: 15px; font-weight: 700; flex: 1; }
.popup-close { width: 28px; height: 28px; border: none; border-radius: 50%; background: var(--surface2); color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 8px; }
.popup-addr { font-size: 12px; color: var(--text2); margin-bottom: 12px; }
.popup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.popup-metric label { display: block; font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.popup-metric span { font-size: 14px; font-weight: 600; font-family: 'JetBrains Mono', monospace; }
.popup-retailer-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-bottom: 8px; }
.badge-hd { background: rgba(232,118,45,0.2); color: var(--orange); }
.badge-lo { background: rgba(26,58,107,0.3); color: #7ab3e0; }
.badge-wm { background: rgba(91,164,207,0.2); color: var(--blue-light); }

.map-status { position: absolute; top: 12px; left: 12px; z-index: 100; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 11px; color: var(--text2); pointer-events: none; }
</style>
</head>

let currentView = 'list';
let currentCat = 'total';
let searchQuery = '';
let expandedId = -1;
let sortBy = 'sales';
let retailerFilter = { 0: true, 1: true, 2: true };

const CATS = { total: 't', color: 'o', cs: 'c', foliage: 'f' };
const CAT_LABELS = { total: 'Total', color: 'Color', cs: 'C&S', foliage: 'Foliage' };
const RET_NAMES = ['Home Depot', "Lowe's", 'Walmart'];
const RET_COLORS = ['#e8762d', '#1a3a6b', '#5ba4cf'];
const RET_COLORS_BRIGHT = ['#f09040', '#3568a8', '#72c0e8'];

function getMetrics(storeId) { return D[CATS[currentCat]][String(storeId)] || null; }
function cleanName(n) { return n.replace(/\s+(PBS|PFS|CEN)\s+/g, ' ').replace(/\s+(PBS|PFS|CEN)$/g, ''); }
function fmtCurrency(v) {
  if (Math.abs(v) >= 1000000) return '$' + (v/1000000).toFixed(1) + 'M';
  if (Math.abs(v) >= 1000) return '$' + (v/1000).toFixed(0) + 'K';
  return '$' + v.toFixed(0);
}
function fmtPct(v) { return (v >= 0 ? '+' : '') + (v * 100).toFixed(1) + '%'; }
function fmtStPct(v) { return (v * 100).toFixed(1) + '%'; }

function getFilteredStores() {
  let stores = [];
  for (let i = 0; i < D.s.length; i++) {
    const s = D.s[i];
    const m = getMetrics(i);
    if (!m) continue;
    if (!retailerFilter[s[4]]) continue;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      const hay = (s[0] + ' ' + s[1] + ' ' + s[2] + ' ' + s[3]).toLowerCase();
      if (!hay.includes(q)) continue;
    }
    stores.push({ id: i, s, m });
  }
  if (sortBy === 'sales') stores.sort((a, b) => b.m[0] - a.m[0]);
  else if (sortBy === 'comp') stores.sort((a, b) => b.m[2] - a.m[2]);
  else if (sortBy === 'name') stores.sort((a, b) => a.s[0].localeCompare(b.s[0]));
  else if (sortBy === 'salespy') stores.sort((a, b) => b.m[1] - a.m[1]);
  return stores;
}

function render() {
  const app = document.getElementById('app');
  const stores = getFilteredStores();
  app.innerHTML = `
    <div class="header">
      <h1>Store Sales Rankings</h1>
      <div class="view-toggle">
        <button class="view-btn ${currentView==='list'?'active':''}" onclick="setView('list')">List</button>
        <button class="view-btn ${currentView==='map'?'active':''}" onclick="setView('map')">Map</button>
      </div>
      <div class="cat-tabs">
        ${Object.keys(CAT_LABELS).map(k => `<button class="cat-tab ${currentCat===k?'active':''}" onclick="setCat('${k}')">${CAT_LABELS[k]}</button>`).join('')}
      </div>
    </div>
    ${currentView === 'list' ? renderList(stores) : renderMap()}
  `;
  if (currentView === 'map') setTimeout(() => initCanvasMap(stores), 50);
}

function renderListInner(stores) {
  return `
      ${stores.length === 0 ? '<div class="no-results">No stores match your filters</div>' : ''}
      ${stores.slice(0, 200).map((st, idx) => {
        const [sales, salesPY, comp, stPct, stPYPct] = st.m;
        const rankCls = ['rank-hd','rank-lo','rank-wm'][st.s[4]];
        const isExp = expandedId === st.id;
        const dName = cleanName(st.s[0]);
        const loc = [st.s[2], st.s[3]].filter(Boolean).join(', ');
        return `<div>
          <div class="store-row" onclick="toggleExpand(${st.id})">
            <div class="rank ${rankCls}">${idx+1}</div>
            <div class="store-info">
              <div class="store-name">${dName}</div>
              <div class="store-addr">${loc}</div>
            </div>
            <div class="store-metrics">
              <div class="store-sales">${fmtCurrency(sales)}</div>
              <div class="store-comp ${comp >= 0 ? 'comp-pos' : 'comp-neg'}">${fmtPct(comp)}</div>
            </div>
          </div>
          ${isExp ? `<div class="store-detail"><div class="detail-grid">
            <div class="detail-item"><label>Sales</label><span>${fmtCurrency(sales)}</span></div>
            <div class="detail-item"><label>Sales PY</label><span>${fmtCurrency(salesPY)}</span></div>
            <div class="detail-item"><label>Comp %</label><span class="${comp >= 0 ? 'comp-pos' : 'comp-neg'}">${fmtPct(comp)}</span></div>
            <div class="detail-item"><label>ST %</label><span>${fmtStPct(stPct)}</span></div>
            <div class="detail-item"><label>ST % PY</label><span>${fmtStPct(stPYPct)}</span></div>
            <div class="detail-item"><label>Retailer</label><span>${RET_NAMES[st.s[4]]}</span></div>
          </div></div>` : ''}
        </div>`;
      }).join('')}
      ${stores.length > 200 ? `<div class="no-results">Showing top 200 of ${stores.length.toLocaleString()}. Search to narrow.</div>` : ''}`;
}

function renderList(stores) {
  return `
    <div class="search-wrap">
      <div class="search-box">

function getCoords(city, state) {
  if (!city || !state) return null;
  const key = city.toUpperCase().trim() + ',' + state.trim();
  if (CC[key]) return CC[key];
  if (STATE_COORDS[state]) {
    const base = STATE_COORDS[state];
    let h = 0;
    for (let i = 0; i < city.length; i++) h = ((h << 5) - h + city.charCodeAt(i)) | 0;
    return [base[0] + ((h & 0xFF) - 128) * 0.015, base[1] + (((h >> 8) & 0xFF) - 128) * 0.02];
  }
  return null;
}

function latLngToScreen(lat, lng, canvas) {
  const w = canvas.width / (window.devicePixelRatio || 1);
  const h = canvas.height / (window.devicePixelRatio || 1);
  const scale = Math.pow(2, mapState.zoom) * 30;
  const x = w/2 + (lng - mapState.cx) * scale * Math.cos(mapState.cy * Math.PI / 180);
  const y = h/2 - (lat - mapState.cy) * scale;
  return [x, y];
}

function screenToLatLng(sx, sy, canvas) {
  const w = canvas.width / (window.devicePixelRatio || 1);
  const h = canvas.height / (window.devicePixelRatio || 1);
  const scale = Math.pow(2, mapState.zoom) * 30;
  const lng = (sx - w/2) / (scale * Math.cos(mapState.cy * Math.PI / 180)) + mapState.cx;
  const lat = -(sy - h/2) / scale + mapState.cy;
  return [lat, lng];
}

  [[39,-80],[39,-75]],[[40,-80],[40,-75]],
  [[38,-89.5],[38,-82]],[[41,-87.5],[41,-80]],
  [[43,-89],[43,-84]],[[44,-90],[44,-84]],
  [[45,-90],[45,-84]],[[46,-90],[46,-84]],
  [[30,-90],[30,-84]],[[31,-88],[31,-85]],
  [[33,-88],[33,-80]],
  [[36,-95],[36,-90]],[[37,-95],[37,-90]],
  [[40,-95],[40,-90]],[[41,-96],[41,-90]],
  [[42,-96],[42,-90]],[[43,-97],[43,-90]],
  [[44,-97],[44,-90]],[[45,-97],[45,-90]],
  [[46,-104],[46,-97]],[[47,-104],[47,-97]],
  [[48,-104],[48,-97]],
  [[42,-104],[42,-96]],[[40,-104],[40,-95]],
  [[37,-109],[37,-103]],[[35,-109],[35,-103]],
  [[33,-109],[33,-103]],[[31.5,-109],[31.5,-103]],
  [[42,-111],[42,-104]],[[41,-111],[41,-104]],

  [[42,-120],[42,-117]],[[42,-117],[42,-111]],

  [[35,-114],[35,-120]],[[34.5,-114],[31.5,-114]],
  [[46,-117],[46,-111]],
  // NS lines
  [[-87.5,37],[-87.5,42]].map(p=>[p[1],p[0]]),
  [[-90,30],[-90,37]].map(p=>[p[1],p[0]]),
  [[-85,30],[-85,35]].map(p=>[p[1],p[0]]),
  [[-84,35],[-84,39]].map(p=>[p[1],p[0]]),
  [[-82,35],[-82,42]].map(p=>[p[1],p[0]]),
  [[-80,35],[-80,42]].map(p=>[p[1],p[0]]),
  [[-95,30],[-95,37]].map(p=>[p[1],p[0]]),
  [[-97,26],[-97,37]].map(p=>[p[1],p[0]]),
  [[-100,28],[-100,37]].map(p=>[p[1],p[0]]),
  [[-103,32],[-103,42]].map(p=>[p[1],p[0]]),
  [[-104,32],[-104,49]].map(p=>[p[1],p[0]]),
  [[-109,31.5],[-109,37]].map(p=>[p[1],p[0]]),
  [[-111,37],[-111,49]].map(p=>[p[1],p[0]]),
  [[-114,32],[-114,42]].map(p=>[p[1],p[0]]),
  [[-117,34],[-117,42]].map(p=>[p[1],p[0]]),
  [[-120,35],[-120,42]].map(p=>[p[1],p[0]]),
];

function drawMap(canvas) {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.clientWidth;
  const h = canvas.clientHeight;
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  
  // Background - ocean blue
  ctx.fillStyle = '#1b2838';
  ctx.fillRect(0, 0, w, h);
  
  // Draw land mass (filled US outline)
  const outline = STATE_OUTLINES[0];
  ctx.beginPath();
  for (let i = 0; i < outline.length; i++) {
    const [x, y] = latLngToScreen(outline[i][0], outline[i][1], canvas);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = '#232d3d';
  ctx.fill();
  ctx.strokeStyle = '#3a4a5f';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  
  // Draw state borders
  ctx.strokeStyle = '#2a3a4f';
  ctx.lineWidth = 0.5;
  STATE_BORDERS.forEach(line => {
    if (!line || line.length < 2) return;
    ctx.beginPath();
    for (let i = 0; i < line.length; i++) {
      const [x, y] = latLngToScreen(line[i][0], line[i][1], canvas);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.stroke();
  });
  
  // Draw state labels at higher zoom levels
  if (mapState.zoom >= 5) {
    ctx.font = '9px DM Sans';
    ctx.fillStyle = '#4a5a6f';
    ctx.textAlign = 'center';
    Object.entries(STATE_COORDS).forEach(([st, [lat, lng]]) => {
      const [x, y] = latLngToScreen(lat, lng, canvas);
      if (x > -20 && x < w + 20 && y > -20 && y < h + 20) {
        ctx.fillText(st, x, y);
      }
    });
  }
  
  // Draw pins
  const pinSize = Math.max(3, Math.min(8, mapState.zoom * 1.2));
  const pinColors = ['#e8762d', '#1a3a6b', '#5ba4cf'];
  const glowColors = ['rgba(232,118,45,0.3)', 'rgba(26,58,107,0.3)', 'rgba(91,164,207,0.3)'];
  
  mapState.pins.forEach((pin, idx) => {
    const [x, y] = latLngToScreen(pin.lat, pin.lng, canvas);
    if (x < -20 || x > w + 20 || y < -20 || y > h + 20) return;
    
    const isSelected = idx === mapState.selectedPin;
    const r = isSelected ? pinSize * 1.8 : pinSize;
    
    // Glow
    ctx.beginPath();
    ctx.arc(x, y, r + 3, 0, Math.PI * 2);
    ctx.fillStyle = glowColors[pin.ret];
    ctx.fill();
    
    // Pin dot
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = pinColors[pin.ret];
    ctx.fill();
    
    if (isSelected) {
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 2;
      ctx.stroke();
    }
  });
  
  // Update status
  const statusEl = document.getElementById('mapStatus');
  if (statusEl) {
    const visiblePins = mapState.pins.filter(pin => {
      const [x, y] = latLngToScreen(pin.lat, pin.lng, canvas);
      return x >= 0 && x <= w && y >= 0 && y <= h;
    }).length;
    statusEl.textContent = `${visiblePins} pins visible`;
  }
}

function initCanvasMap(stores) {
  const canvas = document.getElementById('mapCanvas');
  if (!canvas) return;
  
  // Build pins from stores with coordinates
  mapState.pins = [];
  stores.forEach(st => {
    const coords = getCoords(st.s[2], st.s[3]);
    if (coords) {
      mapState.pins.push({
        lat: coords[0], lng: coords[1],
        ret: st.s[4],
        id: st.id,
        name: st.s[0],
        addr: st.s[1],
        city: st.s[2],
        state: st.s[3],
        m: st.m,
      });
    }
  });
  
  mapState.selectedPin = -1;
  
  // Fit bounds to all pins
  if (mapState.pins.length > 0) {
    let minLat = 90, maxLat = -90, minLng = 180, maxLng = -180;
    mapState.pins.forEach(p => {
      minLat = Math.min(minLat, p.lat);
      maxLat = Math.max(maxLat, p.lat);
      minLng = Math.min(minLng, p.lng);
      maxLng = Math.max(maxLng, p.lng);
    });
    mapState.cx = (minLng + maxLng) / 2;
    mapState.cy = (minLat + maxLat) / 2;
    const latSpan = maxLat - minLat;
    const lngSpan = maxLng - minLng;
    const span = Math.max(latSpan, lngSpan);
    if (span > 30) mapState.zoom = 3.5;
    else if (span > 15) mapState.zoom = 4.5;
    else if (span > 8) mapState.zoom = 5.5;
    else if (span > 4) mapState.zoom = 6.5;
    else mapState.zoom = 7.5;
  }
  
  drawMap(canvas);
  
  // Touch / Mouse events
  const container = document.getElementById('mapContainer');
  
  const getCanvasXY = (e) => {
    const rect = canvas.getBoundingClientRect();
    if (e.touches) return [e.touches[0].clientX - rect.left, e.touches[0].clientY - rect.top];
    return [e.clientX - rect.left, e.clientY - rect.top];
  };
  
  const handleStart = (e) => {
    if (e.touches && e.touches.length === 2) {
      lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      return;
    }
    isDragging = true;
    const [x, y] = getCanvasXY(e);
    dragStart = [x, y];
    dragStartMap = [mapState.cx, mapState.cy];
  };
  
  const handleMove = (e) => {
    e.preventDefault();
    if (e.touches && e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      if (lastTouchDist > 0) {
        const delta = (dist - lastTouchDist) * 0.01;
        mapState.zoom = Math.max(2, Math.min(12, mapState.zoom + delta));
        drawMap(canvas);
      }
      lastTouchDist = dist;
      return;
    }
    if (!isDragging) return;
    const [x, y] = getCanvasXY(e);
    const scale = Math.pow(2, mapState.zoom) * 30;
    const dx = (x - dragStart[0]) / (scale * Math.cos(mapState.cy * Math.PI / 180));
    const dy = (y - dragStart[1]) / scale;
    mapState.cx = dragStartMap[0] - dx;
    mapState.cy = dragStartMap[1] + dy;
    drawMap(canvas);
  };
  
  const handleEnd = (e) => {
    if (!isDragging) { lastTouchDist = 0; return; }
    const [x, y] = getCanvasXY(e.changedTouches ? e.changedTouches[0] : e);
    const movedDist = Math.hypot(x - dragStart[0], y - dragStart[1]);
    isDragging = false;
    lastTouchDist = 0;
    
    // If barely moved, treat as tap - find nearest pin
    if (movedDist < 8) {
      let closest = -1, closestDist = 30; // 30px threshold
      mapState.pins.forEach((pin, idx) => {
        const [px, py] = latLngToScreen(pin.lat, pin.lng, canvas);
        const d = Math.hypot(x - px, y - py);
        if (d < closestDist) { closestDist = d; closest = idx; }
      });
      
      if (closest >= 0) {
        mapState.selectedPin = closest;
        showPopup(mapState.pins[closest]);
      } else {
        mapState.selectedPin = -1;
        hidePopup();
      }
      drawMap(canvas);
    }
  };
  
  canvas.addEventListener('mousedown', handleStart);
  canvas.addEventListener('mousemove', handleMove);
  canvas.addEventListener('mouseup', handleEnd);
  canvas.addEventListener('touchstart', handleStart, { passive: false });
  canvas.addEventListener('touchmove', handleMove, { passive: false });
  canvas.addEventListener('touchend', handleEnd);
  
  // Mouse wheel zoom
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? -0.3 : 0.3;
    mapState.zoom = Math.max(2, Math.min(12, mapState.zoom + delta));
    drawMap(canvas);
  }, { passive: false });
  
  // Resize
  window.addEventListener('resize', () => drawMap(canvas));
}

function showPopup(pin) {
  const overlay = document.getElementById('popupOverlay');
  const card = document.getElementById('popupCard');
  if (!overlay || !card) return;
  
  const [sales, salesPY, comp, stPct, stPYPct] = pin.m;
  const badgeCls = ['badge-hd', 'badge-lo', 'badge-wm'][pin.ret];
  
  card.innerHTML = `
    <div class="popup-header">
      <div>
        <div class="popup-name">${cleanName(pin.name)}</div>
        <div class="popup-addr">${pin.addr ? pin.addr + ', ' : ''}${pin.city}${pin.state ? ', ' + pin.state : ''}</div>
      </div>
      <button class="popup-close" onclick="closePopupBtn(event)">✕</button>
    </div>
    <div class="popup-retailer-badge ${badgeCls}">${RET_NAMES[pin.ret]}</div>
    <div class="popup-grid">
      <div class="popup-metric"><label>Sales</label><span>${fmtCurrency(sales)}</span></div>
      <div class="popup-metric"><label>Sales PY</label><span>${fmtCurrency(salesPY)}</span></div>
      <div class="popup-metric"><label>Comp %</label><span class="${comp >= 0 ? 'comp-pos' : 'comp-neg'}">${fmtPct(comp)}</span></div>
      <div class="popup-metric"><label>ST %</label><span>${fmtStPct(stPct)}</span></div>
    </div>
  `;
  overlay.classList.add('visible');
}

function hidePopup() {
  const overlay = document.getElementById('popupOverlay');
  if (overlay) overlay.classList.remove('visible');
}

function closePopup(event) {
  // Only close if clicking the overlay itself, not the card
  if (event.target === event.currentTarget) {
    hidePopup();
    mapState.selectedPin = -1;
    const canvas = document.getElementById('mapCanvas');
    if (canvas) drawMap(canvas);
  }
}

function closePopupBtn(event) {
  event.stopPropagation();
  hidePopup();
  mapState.selectedPin = -1;
  const canvas = document.getElementById('mapCanvas');
  if (canvas) drawMap(canvas);
}

function mapZoom(dir) {
  mapState.zoom = Math.max(2, Math.min(12, mapState.zoom + dir * 0.5));
  const canvas = document.getElementById('mapCanvas');
  if (canvas) drawMap(canvas);
}

function mapReset() {
  mapState.zoom = 4;
  mapState.cx = -97;
  mapState.cy = 38;
  mapState.selectedPin = -1;
  hidePopup();
  const canvas = document.getElementById('mapCanvas');
  if (canvas) drawMap(canvas);
}

function setView(v) { currentView = v; expandedId = -1; render(); }
function setCat(c) { currentCat = c; expandedId = -1; render(); }
function onSearch(v) {
  searchQuery = v;
  expandedId = -1;
  clearTimeout(window._st);
  window._st = setTimeout(() => {
    if (currentView === 'list') {
      const stores = getFilteredStores();
      const listWrap = document.getElementById('listWrap');
      if (listWrap) {
        listWrap.innerHTML = renderListInner(stores);
        const rc = document.getElementById('resultCount');
        if (rc) rc.textContent = stores.length.toLocaleString() + ' stores · ' + CAT_LABELS[currentCat];
      }
    } else { render(); }
  }, 150);
}
function setSort(v) { sortBy = v; render(); }
function toggleRetailer(r) {
  retailerFilter[r] = !retailerFilter[r];
  if (!retailerFilter[0] && !retailerFilter[1] && !retailerFilter[2]) retailerFilter[r] = true;
  render();
}
function toggleExpand(id) {
  expandedId = expandedId === id ? -1 : id;
  render();
  if (expandedId >= 0) setTimeout(() => {
    const el = document.querySelector('.store-detail');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

render();
</script>
